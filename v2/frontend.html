<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSI v2 - Gestor de Credenciales</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 1200px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .section {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 25px;
            background: #f9f9f9;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
            font-family: 'Courier New', monospace;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.3);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: transform 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .message {
            padding: 12px;
            border-radius: 5px;
            margin-top: 15px;
            font-size: 0.9em;
            word-break: break-all;
        }

        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }

        .warning {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
        }

        .status-box {
            background: white;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hash-display {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.85em;
            margin: 10px 0;
        }

        .hidden {
            display: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 SSI v2</h1>
            <p>Identidad Autosoberana con Verificación On-Chain</p>
        </div>

        <div class="content">
            <!-- Section 1: Issuer Operations -->
            <div class="section">
                <h2>📝 Emisor (Ministerio)</h2>

                <div class="form-group">
                    <label>DNI Ciudadano:</label>
                    <input type="text" id="dni" placeholder="12345678A" value="12345678A">
                </div>

                <div class="form-group">
                    <label>DID del Ciudadano:</label>
                    <textarea id="holder-did" placeholder="did:ethr:0x..." style="height: 40px;"></textarea>
                </div>

                <button onclick="loadHolderDID()">📂 Cargar DID del Archivo</button>

                <div class="button-group">
                    <button onclick="issueCredential()">🎫 Emitir Credencial</button>
                    <button onclick="revokeCredential()">❌ Revocar</button>
                </div>

                <div id="issuer-message" class="message hidden"></div>

                <div class="form-group" style="margin-top: 20px;">
                    <label>Estado de Emisión:</label>
                    <div class="status-box" id="issuer-status">Listo</div>
                </div>
            </div>

            <!-- Section 2: Verifier Operations -->
            <div class="section">
                <h2>✅ Verificador</h2>

                <div class="form-group">
                    <label>Credencial (JSON):</label>
                    <textarea id="credential-json" placeholder="{...}" style="height: 100px;"></textarea>
                </div>

                <button onclick="loadLastCredential()">📂 Cargar Última Credencial</button>
                <button onclick="verifyPresentation()">🔍 Verificar</button>

                <div id="verifier-message" class="message hidden"></div>

                <div class="form-group" style="margin-top: 20px;">
                    <label>Resultado de Verificación:</label>
                    <div class="status-box" id="verifier-status">Esperando entrada...</div>
                </div>
            </div>
        </div>

        <!-- Section 3: Configuration -->
        <div class="content">
            <div class="section">
                <h2>⚙️ Configuración</h2>

                <div class="form-group">
                    <label>URL Issuer:</label>
                    <input type="text" id="issuer-url" value="http://127.0.0.1:5010">
                </div>

                <div class="form-group">
                    <label>URL Verifier:</label>
                    <input type="text" id="verifier-url" value="http://127.0.0.1:5011">
                </div>

                <button onclick="testConnections()">🧪 Probar Conexiones</button>

                <div id="config-message" class="message hidden"></div>
            </div>

            <div class="section">
                <h2>📊 Información del Sistema</h2>
                <div class="status-box" id="system-info">
                    <strong>Sistema SSI v2</strong><br>
                    Emisor: Puerto 5010<br>
                    Verificador: Puerto 5011<br>
                    Blockchain: Hardhat (8545)<br>
                    <br>
                    Estado: Cargando...
                </div>
            </div>
        </div>
    </div>

    <script>
        let lastCredential = null;

        function showMessage(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.className = `message ${type}`;
            element.textContent = message;
            element.classList.remove('hidden');
        }

        function updateStatus(elementId, content) {
            document.getElementById(elementId).textContent = content;
        }

        async function loadHolderDID() {
            try {
                const response = await fetch('wallet.json');
                if (!response.ok) throw new Error('No se encontró wallet.json');
                const data = await response.json();
                document.getElementById('holder-did').value = data.did;
                showMessage('issuer-message', 'DID cargado correctamente', 'success');
            } catch (error) {
                showMessage('issuer-message', `Error: ${error.message}`, 'error');
            }
        }

        async function issueCredential() {
            try {
                const dni = document.getElementById('dni').value;
                const did = document.getElementById('holder-did').value;
                const url = document.getElementById('issuer-url').value;

                if (!dni || !did) {
                    showMessage('issuer-message', 'Falta DNI o DID', 'error');
                    return;
                }

                updateStatus('issuer-status', 'Emitiendo credencial...');

                const response = await fetch(`${url}/api/credentials/issue_dni`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ did_ciudadano: did, numero_dni: dni })
                });

                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(error);
                }

                const data = await response.json();
                lastCredential = data.credential;

                const summary = `
✓ Credencial Emitida
Hash: ${data.credential.credentialHash}
DID Issuer: ${data.credential.issuer}
DID Subject: ${data.credential.credentialSubject.id}

Transacciones On-Chain:
- setDidStatus: ${data.onchain.didStatusTx.txHash}
- registerCredential: ${data.onchain.registerCredentialTx.txHash}
                `;

                updateStatus('issuer-status', summary);
                showMessage('issuer-message', '✓ Credencial emitida y registrada on-chain', 'success');
                
                // Auto-populate verifier
                document.getElementById('credential-json').value = JSON.stringify(data.credential, null, 2);
            } catch (error) {
                updateStatus('issuer-status', `Error: ${error.message}`);
                showMessage('issuer-message', `Error: ${error.message}`, 'error');
            }
        }

        async function verifyPresentation() {
            try {
                const credentialJson = document.getElementById('credential-json').value;
                const url = document.getElementById('verifier-url').value;

                if (!credentialJson) {
                    showMessage('verifier-message', 'Falta credencial', 'error');
                    return;
                }

                const credential = JSON.parse(credentialJson);
                updateStatus('verifier-status', 'Verificando...');

                // Create VP from VC
                const vp = {
                    "@context": ["https://www.w3.org/2018/credentials/v1"],
                    "type": ["VerifiablePresentation"],
                    "verifiableCredential": credential,
                    "proof": { "proofValue": "0x" + Math.random().toString(16).slice(2) }
                };

                const response = await fetch(`${url}/api/verify_presentation`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ vp })
                });

                const data = await response.json();

                if (response.ok) {
                    const summary = `
✓ Verificación Exitosa
Status: ${data.status}
Message: ${data.message}

Validación On-Chain:
- Issuer Autorizado: ${data.onchain.issuerAuthorized ? '✓' : '✗'}
- DID Activo: ${data.onchain.holderDidActive ? '✓' : '✗'}
- No Revocada: ${!data.onchain.credentialRevoked ? '✓' : '✗'}
                    `;
                    updateStatus('verifier-status', summary);
                    showMessage('verifier-message', '✓ Credencial válida y verificada', 'success');
                } else {
                    updateStatus('verifier-status', `Error: ${data.detail}`);
                    showMessage('verifier-message', `Rechazo: ${data.detail}`, 'error');
                }
            } catch (error) {
                updateStatus('verifier-status', `Error: ${error.message}`);
                showMessage('verifier-message', `Error: ${error.message}`, 'error');
            }
        }

        async function revokeCredential() {
            try {
                const credentialJson = document.getElementById('credential-json').value;
                const url = document.getElementById('issuer-url').value;

                if (!credentialJson) {
                    showMessage('issuer-message', 'Falta credencial', 'error');
                    return;
                }

                const credential = JSON.parse(credentialJson);
                const hash = credential.credentialHash;

                if (!hash) {
                    showMessage('issuer-message', 'La credencial no tiene hash', 'error');
                    return;
                }

                updateStatus('issuer-status', 'Revocando credencial...');

                const response = await fetch(`${url}/api/credentials/revoke`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        credential_hash: hash,
                        reason: 'Revocada desde frontend'
                    })
                });

                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(error);
                }

                const data = await response.json();
                const summary = `
✓ Credencial Revocada
Hash: ${hash}
TX Revoke: ${data.tx.txHash}
                `;

                updateStatus('issuer-status', summary);
                showMessage('issuer-message', '✓ Credencial revocada on-chain', 'success');
            } catch (error) {
                updateStatus('issuer-status', `Error: ${error.message}`);
                showMessage('issuer-message', `Error: ${error.message}`, 'error');
            }
        }

        async function loadLastCredential() {
            if (lastCredential) {
                document.getElementById('credential-json').value = JSON.stringify(lastCredential, null, 2);
                showMessage('verifier-message', 'Última credencial cargada', 'info');
            } else {
                showMessage('verifier-message', 'No hay credencial cargada aún', 'warning');
            }
        }

        async function testConnections() {
            try {
                const issuerUrl = document.getElementById('issuer-url').value;
                const verifierUrl = document.getElementById('verifier-url').value;

                let result = 'Probando conexiones...\n';

                try {
                    const issuerTest = await Promise.race([
                        fetch(`${issuerUrl}/docs`),
                        new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 3000))
                    ]);
                    result += `✓ Issuer (${issuerUrl}): Conectado\n`;
                } catch (e) {
                    result += `✗ Issuer (${issuerUrl}): Desconectado\n`;
                }

                try {
                    const verifierTest = await Promise.race([
                        fetch(`${verifierUrl}/docs`),
                        new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 3000))
                    ]);
                    result += `✓ Verifier (${verifierUrl}): Conectado\n`;
                } catch (e) {
                    result += `✗ Verifier (${verifierUrl}): Desconectado\n`;
                }

                document.getElementById('system-info').textContent = result;
                showMessage('config-message', 'Prueba completada', 'info');
            } catch (error) {
                showMessage('config-message', `Error: ${error.message}`, 'error');
            }
        }

        // Initialize on page load
        window.addEventListener('load', () => {
            testConnections();
            loadHolderDID().catch(() => {});
        });
    </script>
</body>
</html>
