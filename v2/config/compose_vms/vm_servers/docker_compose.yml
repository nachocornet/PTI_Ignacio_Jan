x-python-service: &python-service
  build:
    context: ../../..
    dockerfile: Dockerfile
  image: ssi-v2-python:latest
  restart: unless-stopped
  environment:
    SSI_BLOCKCHAIN_NETWORK: ${SSI_BLOCKCHAIN_NETWORK:-sepolia}
    SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL}
    SSI_CONTRACT_FILE: ${SSI_CONTRACT_FILE:-deployments/blockchain_contract.sepolia.json}
    SSI_ISSUER_WALLET_FILE: /app/deployments/runtime/issuer_wallet.json
    SSI_HOLDER_WALLET_FILE: /app/deployments/runtime/wallet.json
    DATABASE_URL: ${DATABASE_URL}
    SSI_CORS_ORIGINS: ${SSI_CORS_ORIGINS}
    SSI_APP_HOST: 0.0.0.0
    SSI_APP_BIND_HOST: 0.0.0.0
  volumes:
    - ../../../deployments:/app/deployments:ro
  healthcheck:
    test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5010/health', timeout=2).read()\""]
    interval: 10s
    timeout: 5s
    retries: 5

services:
  issuer:
    <<: *python-service
    container_name: ssi_issuer
    command: uvicorn services.issuer.app:app --host 0.0.0.0 --port 5010

  verifier:
    <<: *python-service
    container_name: ssi_verifier
    command: uvicorn services.verifier.app:app --host 0.0.0.0 --port 5011
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5011/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  proxy:
    image: nginx:1.27-alpine
    container_name: ssi_backend_proxy
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      issuer:
        condition: service_healthy
      verifier:
        condition: service_healthy
    restart: unless-stopped
