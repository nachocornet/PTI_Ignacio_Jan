services:
  postgres:
    image: postgres:15-alpine
    container_name: ssi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ssi_db}
      POSTGRES_USER: ${POSTGRES_USER:-ssi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_deployments}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ssi_user} -d ${POSTGRES_DB:-ssi_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
