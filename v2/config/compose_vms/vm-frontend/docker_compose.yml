services:
  frontend:
    image: nginx:1.27-alpine
    container_name: ssi_frontend
    ports:
      - "8080:80"
    volumes:
      - ../../../frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/frontend_portal.html >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
