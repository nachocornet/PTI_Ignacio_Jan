<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSI Portal - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }
    h1 {
      text-align: center;
      color: #1f2933;
      margin-bottom: 30px;
      font-size: 1.8rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: #4f5f6b;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e6e3;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 20px;
    }
    .login-btn:hover {
      background: #5568d3;
    }
    .login-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .error {
      color: #dc2626;
      font-size: 0.9rem;
      margin-top: 10px;
      display: none;
    }
    .info {
      background: #f0f4ff;
      border-left: 4px solid #667eea;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: #4f5f6b;
    }
    .session-info {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e0e6e3;
      display: none;
    }
    .session-info h2 {
      font-size: 1rem;
      color: #1f2933;
      margin-bottom: 12px;
    }
    .portal-links {
      display: grid;
      gap: 8px;
    }
    .portal-link {
      display: block;
      padding: 12px;
      background: #f5f7f6;
      border: 1px solid #d7e2de;
      border-radius: 8px;
      text-decoration: none;
      color: #155e75;
      font-weight: 600;
      text-align: center;
      transition: background 0.3s;
    }
    .portal-link:hover {
      background: #e8efec;
    }
    .logout-btn {
      width: 100%;
      padding: 8px;
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 12px;
    }
    .logout-btn:hover {
      background: #b91c1c;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>🔐 SSI Portal</h1>
    
    <div id="login-form">
      <div class="info">
        Login: admin | Contraseña: admin123
      </div>
      <div class="form-group">
        <label for="username">Usuario</label>
        <input id="username" type="text" placeholder="admin" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="••••••••" />
      </div>
      <div class="error" id="error"></div>
      <button class="login-btn" id="login-btn">Entrar</button>
    </div>

    <div class="session-info" id="session-info">
      <h2>✓ Sesión iniciada</h2>
      <p id="session-user"></p>
      <div class="portal-links">
        <a class="portal-link" href="/issuer_admin.html">🏛️ Admin DB Ciudadanos</a>
        <a class="portal-link" href="/verifier_dashboard.html">✔️ Verificador</a>
        <a class="portal-link" href="/issuer_dashboard.html">🎫 Issuer (Debug)</a>
      </div>
      <button class="logout-btn" id="logout-btn">Cerrar sesión</button>
    </div>
  </div>

  <script>
    const SESSION_KEY = 'ssi_session';
    const SESSION_DURATION = 3600000; // 1 hora en ms

    function getSession() {
      const stored = localStorage.getItem(SESSION_KEY);
      if (!stored) return null;
      const session = JSON.parse(stored);
      if (Date.now() > session.expireAt) {
        localStorage.removeItem(SESSION_KEY);
        return null;
      }
      return session;
    }

    function setSession(username) {
      const session = {
        username,
        startedAt: Date.now(),
        expireAt: Date.now() + SESSION_DURATION,
      };
      localStorage.setItem(SESSION_KEY, JSON.stringify(session));
      return session;
    }

    function clearSession() {
      localStorage.removeItem(SESSION_KEY);
    }

    function showLoginForm() {
      document.getElementById('login-form').style.display = 'block';
      document.getElementById('session-info').style.display = 'none';
      document.getElementById('username').focus();
    }

    function showSessionInfo(session) {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('session-info').style.display = 'block';
      document.getElementById('session-user').textContent = `Usuario: ${session.username}`;
    }

    document.getElementById('login-btn').addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');

      if (!username || !password) {
        errorEl.textContent = 'Usuario y contraseña requeridos';
        errorEl.style.display = 'block';
        return;
      }

      // Validación simple contra credenciales admin
      // En producción, verificarías contra un endpoint backend
      if (username === 'admin' && password === 'admin123') {
        const session = setSession(username);
        errorEl.style.display = 'none';
        showSessionInfo(session);
      } else {
        errorEl.textContent = 'Credenciales inválidas';
        errorEl.style.display = 'block';
      }
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      clearSession();
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      showLoginForm();
    });

    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('login-btn').click();
      }
    });

    // Mostrar formulario o sesión al cargar
    const session = getSession();
    if (session) {
      showSessionInfo(session);
    } else {
      showLoginForm();
    }
  </script>
</body>
</html>
