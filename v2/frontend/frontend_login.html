<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSI Portal | Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f766e 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center; justify-content: center;
    }
    .login-container {
      background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      width: 100%; max-width: 400px; padding: 40px; text-align: center;
    }
    h1 { color: #1e293b; margin-bottom: 30px; font-size: 1.8rem; }
    .form-group { margin-bottom: 20px; text-align: left; }
    label { display: block; color: #4f5f6b; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
    input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; transition: 0.3s; }
    input:focus { outline: none; border-color: #0f766e; }
    .login-btn { width: 100%; padding: 14px; background: #0f766e; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    .login-btn:hover { background: #0d9488; }
    .back-btn { display: inline-block; width: 100%; padding: 12px; margin-top: 15px; color: #64748b; text-decoration: none; font-size: 0.9rem; font-weight: 600; border: 1px solid #e2e8f0; border-radius: 10px; transition: 0.2s; }
    .back-btn:hover { background: #f8fafc; color: #1e293b; border-color: #cbd5e1; }
    .error { color: #e11d48; font-size: 0.85rem; margin-top: 10px; display: none; background: #fff1f2; padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>🔐 SSI Admin Login</h1>
    
    <div id="login-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input id="username" type="text" placeholder="admin" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="••••••••" />
      </div>
      <div class="error" id="error"></div>
      <button class="login-btn" id="login-btn">Entrar al Sistema</button>
      
      <a href="/frontend_portal.html" class="back-btn">🏠 Volver al Portal de Inicio</a>
    </div>
  </div>

  <script>
    const SESSION_KEY = 'ssi_session';
    const SESSION_DURATION = 3600000;

    function setSession(username) {
      const session = { username, expireAt: Date.now() + SESSION_DURATION };
      localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    }

    document.getElementById('login-btn').addEventListener('click', () => {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const err = document.getElementById('error');

      if (u === 'admin' && p === 'admin123') {
        setSession(u);
        window.location.href = '/issuer_admin.html';
      } else {
        err.textContent = 'Credenciales inválidas para administración';
        err.style.display = 'block';
      }
    });

    if (localStorage.getItem(SESSION_KEY)) window.location.href = '/issuer_admin.html';
  </script>
</body>
</html>
