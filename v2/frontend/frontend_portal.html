<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSI v2 | Portal de Identidad</title>
  <style>
    :root { --primary: #0f766e; --secondary: #1e293b; --accent: #0284c7; --bg: #f8fafc; --text: #334155; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
    .nav-top { display: flex; justify-content: flex-end; padding: 15px 30px; }
    .admin-link { font-size: 0.85rem; color: #94a3b8; text-decoration: none; font-weight: 600; border: 1px solid #e2e8f0; padding: 5px 12px; border-radius: 20px; transition: 0.2s; }
    .admin-link:hover { color: var(--secondary); border-color: var(--secondary); }
    .main-container { max-width: 800px; margin: 60px auto; text-align: center; padding: 20px; }
    h1 { font-size: 2.5rem; color: var(--secondary); margin-bottom: 10px; }
    p.subtitle { color: #64748b; font-size: 1.1rem; margin-bottom: 40px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .card { background: white; border: 1px solid #e2e8f0; border-radius: 20px; padding: 40px; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; align-items: center; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    .card i { font-size: 3rem; margin-bottom: 20px; }
    .card h2 { color: var(--secondary); margin: 0 0 10px; }
    .card p { color: #64748b; margin: 0; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="nav-top">
    <a href="/issuer_admin.html" class="admin-link">⚙️ Gestión de Sistema</a>
  </div>

  <div class="main-container">
    <h1>SSI v2 Ecosystem</h1>
    <p class="subtitle">Gestiona tu identidad digital soberana basada en Blockchain.</p>

    <div class="grid">
      <a href="/issuer_dashboard.html" class="card">
        <i>🪪</i>
        <h2>Obtener DNI</h2>
        <p>Solicita y emite tu credencial de identidad digital oficial.</p>
      </a>

      <a href="/verifier_dashboard.html" class="card">
        <i>✔️</i>
        <h2>Verificar Acceso</h2>
        <p>Demuestra tu identidad de forma segura ante terceros.</p>
      </a>
    </div>
  </div>
</body>
</html>
