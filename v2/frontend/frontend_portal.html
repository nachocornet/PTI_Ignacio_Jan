<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSI v2 Portal</title>
  <style>
    body { font-family: sans-serif; background: #f2f5f4; color: #1f2933; margin: 0; padding: 24px; }
    .wrap { max-width: 900px; margin: 0 auto; display: grid; gap: 16px; }
    .card { background: #fff; border: 1px solid #d7e2de; border-radius: 14px; padding: 18px; }
    h1 { margin: 0 0 8px; }
    p { margin: 0 0 12px; color: #55636d; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
    a.btn { display: block; text-decoration: none; padding: 12px; border-radius: 10px; border: 1px solid #bfd8d2; background: #e9f7f4; color: #115e59; font-weight: 700; }
    a.btn.secondary { background: #f3f7fb; border-color: #cad8e6; color: #1e3a5f; }
    .hint { font-size: 0.9rem; color: #4d5e69; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>SSI v2 - Portal de Frontends</h1>
      <p>Separacion de interfaces para operacion real: issuer por un lado y verifier por otro.</p>
      <div class="grid">
        <a class="btn" href="/issuer_dashboard.html">Issuer Dashboard</a>
        <a class="btn" href="/verifier_dashboard.html">Verifier Dashboard</a>
        <a class="btn secondary" href="/issuer_admin.html">Issuer Admin</a>
      </div>
    </div>
    <div class="card hint">
      Recomendacion: en produccion despliega cada frontend en dominios separados y limita CORS a su origen.
    </div>
  </div>
</body>
</html>
