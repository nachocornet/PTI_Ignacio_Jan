<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSI v2 | Gestión de Ciudadanos</title>
  <script src="frontend.variables.js"></script>
  <style>
    :root {
      --primary: #0f766e;
      --secondary: #1e293b;
      --accent: #0284c7;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --text: #334155;
      --danger: #e11d48;
    }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.5; }
    .wrap { max-width: 980px; margin: 0 auto; display: grid; gap: 20px; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    .nav-card { display: flex; gap: 15px; padding: 12px 24px; align-items: center; }
    .nav-card a { text-decoration: none; color: var(--accent); font-weight: 600; font-size: 0.9rem; transition: color 0.2s; }
    .nav-card a:hover { color: var(--primary); }
    h1 { margin: 0 0 8px; font-size: 1.8rem; color: var(--secondary); }
    h2 { margin: 0 0 16px; font-size: 1.25rem; color: var(--secondary); }
    .row { margin-bottom: 14px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 6px; }
    input { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-size: 0.95rem; box-sizing: border-box; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
    button { border: 0; border-radius: 10px; padding: 12px 18px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-accent { background: var(--accent); color: white; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border-bottom: 1px solid var(--border); padding: 12px 8px; text-align: left; }
    pre { background: #1e293b; color: #f8fafc; border-radius: 12px; padding: 16px; font-size: 0.84rem; white-space: pre-wrap; }
  </style>
</head>
<body>
  <script>
    const session = JSON.parse(localStorage.getItem('ssi_session'));
    if (!session || Date.now() > session.expireAt) {
      localStorage.removeItem('ssi_session');
      window.location.href = '/frontend_login.html';
    }
  </script>

  <div class="wrap">
    <div class="card nav-card">
      <a href="/frontend_portal.html">🏠 Inicio</a>
      <a href="/issuer_dashboard.html">🪪 Emitir</a>
      <a href="/verifier_dashboard.html">✔️ Verificar</a>
      <span style="flex-grow: 1;"></span>
      <span style="color: #64748b; font-size: 0.9rem;">Admin: <strong id="session-user"></strong></span>
      <button onclick="localStorage.removeItem('ssi_session'); window.location.href='/frontend_login.html'" style="background:#e11d48; color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer;">Cerrar sesión</button>
    </div>

    <div class="card">
      <h1>Alta de Ciudadano</h1>
      <p>Añade ciudadanos a la base de datos oficial para que puedan solicitar su DNI Digital.</p>
      <div class="grid-2">
        <div class="row"><label>DNI</label><input id="dni" placeholder="12345678A" /></div>
        <div class="row"><label>Nombre Completo</label><input id="nombre" placeholder="Nombre y apellidos" /></div>
      </div>
      <div class="row">
        <label>Fecha de nacimiento (YYYY-MM-DD)</label>
        <input id="fecha" placeholder="2000-01-01" />
      </div>
      <div class="actions">
        <button id="btn-add" class="btn-primary">Guardar en Base de Datos</button>
        <button id="btn-refresh" class="btn-accent">Actualizar Lista</button>
      </div>
    </div>

    <div class="card">
      <h2>Registros en el Sistema</h2>
      <table>
        <thead><tr><th>ID</th><th>DNI</th><th>Nombre</th><th>Nacimiento</th></tr></thead>
        <tbody id="citizens-body"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Log de Operaciones</h2>
      <pre id="output">Esperando...</pre>
    </div>
  </div>

  <script>
    const config = window.SSI_CONFIG || {};
    const apiBaseUrl = (config.urls?.issuerApiBaseUrl || 'http://nattech.fib.upc.edu:40570').replace(/\/$/, '');
    const authHeader = `Basic ${btoa('admin:admin123')}`;

    document.getElementById('session-user').textContent = JSON.parse(localStorage.getItem('ssi_session'))?.username;

    async function api(path, options = {}) {
      const resp = await fetch(`${apiBaseUrl}${path}`, {
        ...options,
        headers: { ...options.headers, 'Authorization': authHeader }
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || 'Error API');
      return data;
    }

    async function load() {
      try {
        const data = await api('/api/admin/citizens_dni');
        document.getElementById('citizens-body').innerHTML = data.items.map(c => `
          <tr><td>${c.id}</td><td>${c.numero_dni}</td><td>${c.nombre}</td><td>${c.fecha_nacimiento}</td></tr>
        `).join('');
      } catch (e) { document.getElementById('output').textContent = e.message; }
    }

    document.getElementById('btn-add').onclick = async () => {
      try {
        const payload = {
          numero_dni: document.getElementById('dni').value.trim(),
          nombre: document.getElementById('nombre').value.trim(),
          fecha_nacimiento: document.getElementById('fecha').value.trim()
        };
        await api('/api/admin/citizens_dni', {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
        });
        document.getElementById('output').textContent = "✅ Guardado correctamente";
        load();
      } catch (e) { document.getElementById('output').textContent = "❌ " + e.message; }
    };

    document.getElementById('btn-refresh').onclick = load;
    window.onload = load;
  </script>
</body>
</html>
