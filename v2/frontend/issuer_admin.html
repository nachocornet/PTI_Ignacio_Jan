<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSI v2 | Issuer Admin</title>
  <script src="frontend.variables.js"></script>
  <style>
    :root {
      --primary: #0f766e;
      --secondary: #1e293b;
      --accent: #0284c7;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --text: #334155;
      --danger: #e11d48;
    }

    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.5; }
    .wrap { max-width: 980px; margin: 0 auto; display: grid; gap: 20px; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    .nav-card { display: flex; gap: 15px; padding: 12px 24px; flex-wrap: wrap; }
    .nav-card a { text-decoration: none; color: var(--accent); font-weight: 600; font-size: 0.9rem; transition: color 0.2s; }
    .nav-card a:hover { color: var(--primary); }
    h1 { margin: 0 0 8px; font-size: 1.8rem; color: var(--secondary); }
    h2 { margin: 0 0 16px; font-size: 1.25rem; color: var(--secondary); }
    p { margin: 0 0 20px; font-size: 0.95rem; color: #64748b; }
    .row { margin-bottom: 14px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 6px; }
    input {
      width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 12px;
      font-size: 0.95rem; box-sizing: border-box; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1); }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
    button {
      border: 0; border-radius: 10px; padding: 12px 18px; cursor: pointer;
      font-weight: 600; font-size: 0.9rem; transition: transform 0.1s, opacity 0.2s;
    }
    button:hover { opacity: 0.92; }
    button:active { transform: scale(0.98); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .status { font-weight: 700; font-size: 0.88rem; }
    .status.ok { color: #166534; }
    .status.bad { color: #991b1b; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { border-bottom: 1px solid var(--border); padding: 10px 8px; text-align: left; }
    th { color: #0f172a; }
    pre { background: #1e293b; color: #f8fafc; border-radius: 12px; padding: 16px; font-size: 0.84rem; white-space: pre-wrap; margin: 0; }
  </style>
</head>
<body>
  <script>
    // Verificar sesión
    const SESSION_KEY = 'ssi_session';
    const session = (() => {
      const stored = localStorage.getItem(SESSION_KEY);
      if (!stored) return null;
      const s = JSON.parse(stored);
      if (Date.now() > s.expireAt) {
        localStorage.removeItem(SESSION_KEY);
        return null;
      }
      return s;
    })();
    
    if (!session) {
      alert('Sesión expirada. Vuelve a iniciar sesión.');
      window.location.href = '/frontend_login.html';
    }
  </script>
  <div class="wrap">
    <div class="card nav-card">
      <a href="/frontend_login.html">🏠 Portal</a>
      <a href="/issuer_dashboard.html">🪪 Issuer</a>
      <a href="/verifier_dashboard.html">✔️ Verifier</a>
      <span style="flex-grow: 1;"></span>
      <span style="color: #64748b; font-size: 0.9rem;">Usuario: <strong id="session-user"></strong></span>
      <button id="logout-btn" style="background: #e11d48; color: white; border: none; border-radius: 10px; padding: 8px 12px; cursor: pointer; font-weight: 600; font-size: 0.85rem;">Cerrar sesión</button>
    </div>

    <div class="card">
      <h2>Alta de ciudadano</h2>
      <div class="grid-2">
        <div class="row">
          <label for="dni">DNI</label>
          <input id="dni" placeholder="12345678A" />
        </div>
        <div class="row">
          <label for="nombre">Nombre</label>
          <input id="nombre" placeholder="Nombre y apellidos" />
        </div>
      </div>
      <div class="grid-2">
        <div class="row">
          <label for="fecha">Fecha nacimiento (YYYY-MM-DD)</label>
          <input id="fecha" placeholder="2000-01-01" />
        </div>
        <div class="row">
          <label for="edad">Edad (opcional si no indicas fecha)</label>
          <input id="edad" placeholder="25" />
        </div>
      </div>
      <div class="actions">
        <button id="btn-add" class="btn-primary">Guardar ciudadano</button>
        <button id="btn-refresh" class="btn-accent">Refrescar listado</button>
      </div>
    </div>

    <div class="card">
      <h2>Ciudadanos registrados</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>DNI</th>
            <th>Nombre</th>
            <th>Fecha nacimiento</th>
          </tr>
        </thead>
        <tbody id="citizens-body"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Actividad</h2>
      <pre id="output">Esperando operaciones admin...</pre>
    </div>
  </div>
<script>
    const config = window.SSI_CONFIG || {};
    const apiBaseUrl = (config.urls?.issuerApiBaseUrl || config.urls?.apiBaseUrl || 'http://nattech.fib.upc.edu:40570').replace(/\/$/, '');

    // Sesión
    const SESSION_KEY = 'ssi_session';
    const session = (() => {
      const stored = localStorage.getItem(SESSION_KEY);
      if (!stored) return null;
      const s = JSON.parse(stored);
      if (Date.now() > s.expireAt) {
        localStorage.removeItem(SESSION_KEY);
        return null;
      }
      return s;
    })();
    
    if (!session) {
        window.location.href = '/frontend_login.html';
    }

    document.getElementById('session-user').textContent = session?.username || 'Desconocido';
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem(SESSION_KEY);
      window.location.href = '/frontend_login.html';
    });

    const out = document.getElementById('output');
    const tableBody = document.getElementById('citizens-body');

    const authHeader = `Basic ${btoa(`admin:admin123`)}`;

    function setOut(text) { out.textContent = text; }

    async function adminFetch(path, options = {}) {
      const headers = { ...(options.headers || {}) };
      if (authHeader) headers.Authorization = authHeader;
      // Usamos apiBaseUrl directamente
      const response = await fetch(`${apiBaseUrl}${path}`, { ...options, headers });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(body.detail || `HTTP ${response.status}`);
      return body;
    }

    window.addEventListener('DOMContentLoaded', refreshCitizens);


    function renderCitizens(items) {
      if (!items.length) {
        tableBody.innerHTML = '<tr><td colspan="4">No hay ciudadanos registrados.</td></tr>';
        return;
      }

      tableBody.innerHTML = items.map((item) => `
        <tr>
          <td>${item.id}</td>
          <td>${item.numero_dni}</td>
          <td>${item.nombre}</td>
          <td>${item.fecha_nacimiento}</td>
        </tr>
      `).join('');
    }

    async function refreshCitizens() {
      try {
        const data = await adminFetch('/api/admin/citizens');
        renderCitizens(data.items || []);
        setOut(`Listado actualizado. Total: ${(data.items || []).length}`);
      } catch (e) {
        setOut(`Error cargando ciudadanos: ${e.message}`);
      }
    }

    async function addCitizen() {
      try {
        const payload = {
          numero_dni: document.getElementById('dni').value.trim(),
          nombre: document.getElementById('nombre').value.trim(),
          fecha_nacimiento: document.getElementById('fecha').value.trim(),
          edad: document.getElementById('edad').value.trim()
        };
        if (!payload.fecha_nacimiento) delete payload.fecha_nacimiento;
        if (!payload.edad) delete payload.edad;

        const data = await adminFetch('/api/admin/citizens', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        setOut(`Ciudadano creado: ${data.citizen.numero_dni} - ${data.citizen.nombre}`);
        await refreshCitizens();
      } catch (e) {
        setOut(`Error creando ciudadano: ${e.message}`);
      }
    }

    document.getElementById('btn-login').addEventListener('click', login);
    document.getElementById('btn-add').addEventListener('click', addCitizen);
    document.getElementById('btn-refresh').addEventListener('click', refreshCitizens);
  </script>
</body>
</html>
