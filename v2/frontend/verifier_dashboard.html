<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSI v2 | Verificador Oficial</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="frontend.variables.js"></script>
  <style>
    :root { --primary: #0f766e; --accent: #0284c7; --bg: #f8fafc; --text: #334155; --border: #e2e8f0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    .wrap { max-width: 850px; margin: 0 auto; display: grid; gap: 20px; }
    .card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px rgb(0 0 0 / 0.05); }
    .nav { display: flex; gap: 15px; margin-bottom: 10px; }
    .nav a { text-decoration: none; color: var(--accent); font-weight: 600; }
    h1 { color: #1e293b; margin: 0 0 10px; }
    .step { padding: 15px; border-radius: 12px; margin-bottom: 15px; background: #fdf2f8; border: 1px solid #fbcfe8; }
    input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-top: 5px; background: white; }
    button { border: 0; border-radius: 10px; padding: 12px 20px; cursor: pointer; font-weight: 600; background: var(--primary); color: white; margin-top: 10px; width: 100%; }
    pre { background: #1e293b; color: #f8fafc; padding: 15px; border-radius: 10px; overflow: auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav"><a href="/frontend_portal.html">🏠 Inicio</a></div>
    
    <div class="card">
      <h1>Verificador de Identidad</h1>
      <p>Valida la autenticidad de un DNI digital consultando el estado en tiempo real en la Blockchain.</p>
      
      <div class="step">
        <strong>1. Tu Cartera (Holder)</strong>
        <input type="file" id="walletFile" accept=".json">
      </div>
      
      <div class="step">
        <strong>2. DNI Digital (VC)</strong>
        <input type="file" id="vcFile" accept=".json">
      </div>

      <button id="btn-verify">Firmar y Verificar Acceso</button>
    </div>

    <div class="card">
      <h3>Resultado de la Verificación</h3>
      <pre id="output">Esperando archivos...</pre>
    </div>
  </div>

  <script>
    const config = window.SSI_CONFIG || {};
    const apiBaseUrl = (config.urls?.verifierApiBaseUrl || 'http://nattech.fib.upc.edu:40570').replace(/\/$/, '');
    let wallet = null; let vc = null;

    document.getElementById('walletFile').onchange = async (e) => {
      const data = JSON.parse(await e.target.files[0].text());
      wallet = new ethers.Wallet(data.private_key);
    };

    document.getElementById('vcFile').onchange = async (e) => {
      vc = JSON.parse(await e.target.files[0].text());
    };

    document.getElementById('btn-verify').onclick = async () => {
      const out = document.getElementById('output');
      if (!wallet || !vc) return alert("Carga ambos archivos");

      try {
        out.textContent = "Verificando en Blockchain...";
        const vp = {
          '@context': ['https://www.w3.org/2018/credentials/v1'],
          type: ['VerifiablePresentation'],
          verifiableCredential: vc
        };
        const canonical = JSON.stringify(vp, Object.keys(vp).sort());
        const signature = await wallet.signMessage(canonical);
        vp.proof = { type: 'EcdsaSecp256k1RecoverySignature2020', proofPurpose: 'authentication', verificationMethod: `did:ethr:${wallet.address}`, proofValue: signature };

        const res = await fetch(`${apiBaseUrl}/api/verify_presentation`, {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ vp })
        });
        const body = await res.json();
        if (!res.ok) throw new Error(body.detail);

        out.textContent = `✅ ACCESO CONCEDIDO\n------------------\nIssuer OK: ${body.onchain.issuerAuthorized}\nHolder Activo: ${body.onchain.holderDidActive}\nNo Revocada: ${!body.onchain.credentialRevoked}`;
      } catch (e) { out.textContent = "❌ ACCESO DENEGADO: " + e.message; }
    };
  </script>
</body>
</html>
