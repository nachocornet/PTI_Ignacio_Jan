<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSI v2 | Verificador Oficial</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="frontend.variables.js"></script>
  <style>
    :root { --primary: #0f766e; --accent: #0284c7; --bg: #f8fafc; --text: #334155; --border: #e2e8f0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    .wrap { max-width: 850px; margin: 0 auto; display: grid; gap: 20px; }
    .card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px rgb(0 0 0 / 0.05); }
    .nav { display: flex; gap: 15px; margin-bottom: 10px; }
    .nav a { text-decoration: none; color: var(--accent); font-weight: 600; }
    h1 { color: #1e293b; margin: 0 0 10px; }
    .step { padding: 15px; border-radius: 12px; margin-bottom: 15px; background: #fff1f2; border: 1px solid #fecdd3; }
    input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-top: 5px; background: white; }
    button { border: 0; border-radius: 10px; padding: 12px 20px; cursor: pointer; font-weight: 700; background: var(--primary); color: white; margin-top: 10px; width: 100%; }
    pre { background: #1e293b; color: #f8fafc; padding: 15px; border-radius: 10px; overflow: auto; min-height: 100px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav"><a href="/frontend_portal.html">🏠 Inicio</a></div>
    
    <div class="card">
      <h1>Verificador de Identidad</h1>
      <p>Valida tu identidad firmando criptográficamente. El sistema comprobará la validez on-chain.</p>
      
      <div class="step">
        <strong>1. Tu Cartera (Holder)</strong>
        <div id="wallet-status" style="margin-bottom: 10px; color: #0f766e; font-weight: 600;"></div>
        <div id="walletInputContainer">
          <input type="file" id="walletFile" accept=".json">
        </div>
      </div>
      
      <div class="step">
        <strong>2. DNI Digital (Archivo JSON)</strong>
        <input type="file" id="vcFile" accept=".json">
      </div>

      <button id="btn-verify">Firmar y Verificar Acceso</button>
    </div>

    <div class="card">
      <h3>Resultado del Control</h3>
      <pre id="output">Sube tu DNI digital para verificar.</pre>
    </div>
  </div>

  <script>
    const config = window.SSI_CONFIG || {};
    const apiBaseUrl = (config.urls?.verifierApiBaseUrl || 'http://nattech.fib.upc.edu:40570').replace(/\/$/, '');
    let wallet = null; 
    let vc = null;

    // --- CARGAR WALLET DESDE LOCALSTORAGE ---
    function loadWallet() {
      const stored = localStorage.getItem('ssi_holder_wallet');
      if (stored) {
        try {
          const data = JSON.parse(stored);
          wallet = new ethers.Wallet(data.private_key);
          document.getElementById('wallet-status').innerHTML = `✅ Cartera Activa (${data.did.substring(0,18)}...) <a href="#" onclick="clearWallet()" style="color:#e11d48; margin-left:10px; font-weight:normal; text-decoration:none;">[Cambiar]</a>`;
          document.getElementById('walletInputContainer').style.display = 'none';
        } catch (e) { clearWallet(); }
      }
    }

    function clearWallet() {
      localStorage.removeItem('ssi_holder_wallet');
      wallet = null;
      document.getElementById('wallet-status').innerHTML = '';
      document.getElementById('walletInputContainer').style.display = 'block';
    }

    window.onload = loadWallet;

    document.getElementById('walletFile').onchange = async (e) => {
      const text = await e.target.files[0].text();
      localStorage.setItem('ssi_holder_wallet', text);
      loadWallet();
    };

    document.getElementById('vcFile').onchange = async (e) => {
      try {
        vc = JSON.parse(await e.target.files[0].text());
        document.getElementById('output').textContent = "DNI cargado correctamente. Listo para verificar.";
      } catch (e) { alert("Archivo DNI inválido"); }
    };

    // --- FUNCIÓN DE CANONICIDAD RECURSIVA ---
    function canonicalize(obj) {
      if (Array.isArray(obj)) return obj.map(canonicalize);
      if (obj !== null && typeof obj === 'object') {
        return Object.keys(obj).sort().reduce((acc, key) => {
          acc[key] = canonicalize(obj[key]);
          return acc;
        }, {});
      }
      return obj;
    }

    document.getElementById('btn-verify').onclick = async () => {
      const out = document.getElementById('output');
      if (!wallet || !vc) return alert("Por favor, asegúrate de tener la Cartera y el DNI cargados.");

      try {
        out.textContent = "Generando prueba de identidad y consultando Blockchain...";
        
        const vp = {
          '@context': ['https://www.w3.org/2018/credentials/v1'],
          type: ['VerifiablePresentation'],
          verifiableCredential: vc
        };

        // Ordenar el JSON igual que lo hace Python para que la firma coincida
        const canonical = JSON.stringify(canonicalize(vp));
        const signature = await wallet.signMessage(canonical);
        
        vp.proof = {
          type: 'EcdsaSecp256k1RecoverySignature2020',
          proofPurpose: 'authentication',
          verificationMethod: `did:ethr:${wallet.address}`,
          proofValue: signature
        };

        const res = await fetch(`${apiBaseUrl}/api/verify_presentation`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ vp })
        });
        
        const body = await res.json();
        
        if (!res.ok) {
          let errorMsg = body.detail;
          if (typeof body.detail === 'object' && body.detail.error) {
              errorMsg = body.detail.error;
          }
          throw new Error(errorMsg || "Error en el servidor");
        }

        // 1. Extraemos el valor de mayoría de edad de forma segura
        // Miramos si es un objeto directo o el primer elemento de un array
        const subject = Array.isArray(vc.credentialSubject) ? vc.credentialSubject[0] : vc.credentialSubject;
        const esMayor = subject?.isOver18 === true;

        // 2. Definimos los textos dinámicos según la edad
        const titulo = esMayor ? '✅ ACCESO AUTORIZADO' : '🔞 ACCESO RESTRINGIDO (MENOR)';
        const statusEdad = esMayor ? '🟢 Mayor de edad' : '🔞 Menor de edad';

        // 3. Mostramos el panel de control completo y formateado
        out.textContent = [
          titulo,
          '----------------------',
          `Información: ${statusEdad}`,
          `Emisor: ${body.onchain?.issuerAuthorized ? 'Válido (Ministerio)' : 'No autorizado'}`,
          `Titular: ${body.onchain?.holderDidActive ? 'Activo' : 'Inactivo'}`,
          `Estado: ${body.onchain?.credentialRevoked ? '🔴 REVOCADO' : '🟢 VIGENTE'}`
        ].join('\n');

        // Opcional: Cambiar el color del borde de la tarjeta según el acceso
        const card = out.closest('.card');
        if (card) card.style.borderColor = esMayor ? '#0f766e' : '#e11d48';
      } catch (e) {
        out.textContent = "❌ ACCESO DENEGADO: " + e.message;
      }
    };
  </script>
</body>
</html>
