<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSI v2 Issuer Dashboard</title>
  <script src="frontend.variables.js"></script>
  <style>
    body { font-family: sans-serif; background: #f5f7f6; color: #1f2933; margin: 0; padding: 20px; }
    .wrap { max-width: 980px; margin: 0 auto; display: grid; gap: 14px; }
    .card { background: #fff; border: 1px solid #d7e2de; border-radius: 12px; padding: 16px; }
    h1, h2 { margin: 0 0 10px; }
    .row { display: grid; gap: 8px; margin-bottom: 10px; }
    label { font-size: 0.9rem; color: #4f5f6b; }
    input, textarea, button { font-size: 0.95rem; }
    input, textarea { width: 100%; border: 1px solid #c8d5d1; border-radius: 8px; padding: 10px; }
    textarea { min-height: 110px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    button { border: 0; border-radius: 8px; padding: 10px 12px; cursor: pointer; background: #0f766e; color: #fff; }
    button.alt { background: #ea580c; }
    pre { background: #f6faf9; border: 1px solid #dce7e3; border-radius: 8px; padding: 10px; white-space: pre-wrap; }
    .top-links a { margin-right: 8px; color: #155e75; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card top-links">
      <a href="/frontend_portal.html">Portal</a>
      <a href="/verifier_dashboard.html">Verifier</a>
    </div>
    <div class="card">
      <h1>Issuer Dashboard</h1>

      <div style="margin-bottom: 20px; padding: 15px; background: #e0f2fe; border-radius: 8px; border: 1px solid #bae6fd;">
        <h4 style="margin-top: 0; color: #0369a1;">🔑 1. Identifícate (Como Ciudadano)</h4>
        <p style="font-size: 13px; color: #0284c7; margin-bottom: 10px;">Sube tu archivo wallet.json para que el Gobierno sepa a quién emitirle el DNI.</p>
        <input type="file" id="walletInput" accept=".json" style="margin-bottom: 10px; background: white;">
        <button onclick="cargarWalletManual()" style="background-color: #0284c7; color: white;">Cargar mi Wallet</button>
        <span id="walletStatus" style="margin-left: 10px; font-weight: bold; color: #555;">Estado: ❌ No cargada</span>
      </div>
      <div class="row">
        <label for="api-base-url">API Base URL</label>
        <input id="api-base-url" />
      </div>
      <div class="row">
        <label for="dni">DNI</label>
        <input id="dni" value="12345678A" />
      </div>
      <div class="row">
        <label for="holder-did">DID Holder (Se rellenará solo al cargar la wallet)</label>
        <input id="holder-did" placeholder="did:ethr:0x..." />
      </div>
      <div class="actions">
        <button id="btn-issue">Emitir VC</button>
        <button id="btn-download" style="display:none; background:#008CBA;">📥 Descargar mi DNI</button>
      </div>
      <h2 style="margin-top:14px;">Revocación</h2>
      <div class="row">
        <label for="credential-hash">Credential Hash</label>
        <input id="credential-hash" placeholder="0x..." />
      </div>
      <div class="row">
        <label for="reason">Reason</label>
        <input id="reason" value="revocada desde issuer dashboard" />
      </div>
      <div class="actions">
        <button id="btn-revoke" class="alt">Revocar VC</button>
      </div>
    </div>
    <div class="card">
      <h2>Salida</h2>
      <pre id="output">Sin operaciones.</pre>
    </div>
  </div>

  <script>
    const config = window.SSI_CONFIG || {};
    const apiBaseUrl = (config.urls?.issuerApiBaseUrl || config.urls?.apiBaseUrl || 'http://nattech.fib.upc.edu:40570').replace(/\/$/, '');
    const apiBase = document.getElementById('api-base-url');
    const dni = document.getElementById('dni');
    const holderDid = document.getElementById('holder-did');
    const hash = document.getElementById('credential-hash');
    const reason = document.getElementById('reason');
    const out = document.getElementById('output');

    apiBase.value = apiBaseUrl;

    function setOut(text) { out.textContent = text; }

    // --- FUNCIÓN PARA CARGAR LA WALLET ---
    function cargarWalletManual() {
      const file = document.getElementById('walletInput').files[0];
      if (!file) return alert("Por favor, selecciona tu archivo wallet.json primero.");
      
      const reader = new FileReader();
      reader.onload = function(e) {
          try {
              const walletData = JSON.parse(e.target.result);
              document.getElementById('holder-did').value = walletData.did;
              document.getElementById('walletStatus').innerText = "Estado: ✅ Cargada";
              alert("¡Wallet cargada! Tu DID se ha rellenado automáticamente.");
          } catch (err) {
              alert("Error: El archivo no es un JSON válido.");
          }
      };
      reader.readAsText(file);
    }
    // ------------------------------------

    let carnetGenerado = null; 

    async function issue() {
      try {
        const payload = { did_ciudadano: holderDid.value.trim(), numero_dni: dni.value.trim() };
        const r = await fetch(`${apiBase.value.replace(/\/$/, '')}/api/credentials/issue_dni`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
        });
        const body = await r.json();
        if (!r.ok) throw new Error(body.detail || 'Error emitiendo');
        hash.value = body.credential?.credentialHash || '';
        
        carnetGenerado = body.credential;
        document.getElementById('btn-download').style.display = 'inline-block';

        setOut([
          'VC emitida OK',
          `Holder: ${body.credential?.credentialSubject?.id}`,
          `Hash: ${body.credential?.credentialHash}`,
          `Tx DID: ${body.onchain?.didStatusTx?.txHash || 'n/d'}`,
          `Tx Register: ${body.onchain?.registerCredentialTx?.txHash || 'n/d'}`,
          '',
          '¡Haz clic en "Descargar mi DNI" para guardarlo!'
        ].join('\n'));
      } catch (e) {
        setOut(`Error issue: ${e.message}`);
      }
    }

    document.getElementById('btn-download').addEventListener('click', () => {
      if (!carnetGenerado) return;
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(carnetGenerado, null, 2));
      const a = document.createElement('a');
      a.href = dataStr;
      a.download = "mi_dni_digital.json";
      a.click();
    });

    async function revoke() {
      try {
        const payload = { credential_hash: hash.value.trim(), reason: reason.value.trim() };
        const r = await fetch(`${apiBase.value.replace(/\/$/, '')}/api/credentials/revoke`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
        });
        const body = await r.json();
        if (!r.ok) throw new Error(body.detail || 'Error revocando');
        setOut([
          'VC revocada OK',
          `Hash: ${body.credential_hash}`,
          `Tx revoke: ${body.tx?.txHash || 'n/d'}`
        ].join('\n'));
      } catch (e) {
        setOut(`Error revoke: ${e.message}`);
      }
    }

    document.getElementById('btn-issue').addEventListener('click', issue);
    document.getElementById('btn-revoke').addEventListener('click', revoke);
  </script>
</body>
</html>
