name: Teardown Cloud VMs

on:
  workflow_dispatch: # Permite ejecutarlo manualmente desde la web de GitHub

jobs:
  teardown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run Teardown Script
        env:
          NATTECH_HOST: nattech.fib.upc.edu
          SSH_USER: alumne
          FRONTEND_SSH_PORT: '40561'
          BACKEND_SSH_PORT: '40571'
          DB_SSH_PORT: '40581'
          DEPLOY_PATH: /home/alumne/pti-v2
        run: |
          chmod +x scripts/teardown.sh
          ./scripts/teardown.sh vms