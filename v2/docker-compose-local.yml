version: '3.8'

# Stack local de referencia. Para producción usa config/compose_vms/*.
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ssi_user
      POSTGRES_PASSWORD: ssi_password
      POSTGRES_DB: ssi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  issuer:
    build: .
    command: uvicorn services.issuer.app:app --host 0.0.0.0 --port 5010
    ports:
      - "5010:5010"
    environment:
      - DATABASE_URL=postgresql+psycopg2://ssi_user:ssi_password@db:5432/ssi_db
    depends_on:
      - db

  verifier:
    build: .
    command: uvicorn services.verifier.app:app --host 0.0.0.0 --port 5011
    ports:
      - "5011:5011"
    environment:
      - DATABASE_URL=postgresql+psycopg2://ssi_user:ssi_password@db:5432/ssi_db
    depends_on:
      - db

  frontend:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./config/compose_vms/vm-frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - issuer
      - verifier

volumes:
  postgres_data: